# Validate commit messages
commit-msg:
  jobs:
    - name: commitlint
      run: npx --no -- commitlint --edit {1}

# Validate content before committing
pre-commit:
  jobs:
    - name: ultracite
      run: npx ultracite fix --type-aware --type-check
      glob:
        - '**/*.js'
        - '**/*.jsx'
        - '**/*.ts'
        - '**/*.tsx'
        - '**/*.json'
        - '**/*.jsonc'
        - '**/*.css'
      stage_fixed: true
    - name: knip
      glob: '*'
      run: npm run check:deps
